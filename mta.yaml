_schema-version: "3.1"
ID: MDGProfitCenter
description: A simple CAP project.
version: 1.0.0
modules:
- name: MDGProfitCenter-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: MDGProfitCenter-auth
  - name: MDGProfitCenter-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    memory: 128M
    readiness-health-check-http-endpoint: /health
    readiness-health-check-type: http
  build-parameters:
    builder: npm
- name: MDGProfitCenter-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: MDGProfitCenter-db
  parameters:
    buildpack: nodejs_buildpack
- name: MDGProfitCenter-destination-content
  type: com.sap.application.content
  requires:
  - name: MDGProfitCenter-destination-service
    parameters:
      content-target: true
  - name: MDGProfitCenter_html_repo_host
    parameters:
      service-key:
        name: MDGProfitCenter_html_repo_host-key
  - name: MDGProfitCenter-auth
    parameters:
      service-key:
        name: MDGProfitCenter-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: MDGProfitCenter_approuter_MDGProfitCenter_html_repo_host
          ServiceInstanceName: MDGProfitCenter-html5-app-host-service
          ServiceKeyName: MDGProfitCenter_html_repo_host-key
          sap.cloud.service: MDGProfitCenter_approuter
        - Authentication: OAuth2UserTokenExchange
          Name: MDGProfitCenter_approuter_MDGProfitCenter_auth
          ServiceInstanceName: MDGProfitCenter-auth
          ServiceKeyName: MDGProfitCenter-auth-key
          sap.cloud.service: MDGProfitCenter_approuter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: MDGProfitCenter-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: MDGProfitCenter_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - mdgprofitcenteruiprofitcenterinitiatorui.zip
      name: mdgprofitcenteruiprofitcenterinitiatorui
      target-path: resources/
- name: mdgprofitcenteruiprofitcenterinitiatorui
  type: html5
  path: app/profitcenterinitiatorui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: MDGProfitCenter-auth
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: MDGProfitCenter-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: MDGProfitCenter-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: profitcenter-srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
            WebIDEEnabled: true
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
      version: 1.0.0
    service: destination
    service-name: MDGProfitCenter-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: MDGProfitCenter_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: MDGProfitCenter-html5-app-host-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
